name: Python Tests

on: [ push, pull_request ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'adopt'

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which java))))" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          sed -i "s/^usernames =.*/usernames = ${{ secrets.TG_USERNAMES }}/" telegram-notifier-config.ini
          export JAVA_HOME=$JAVA_HOME
          pytest ./tests --alluredir=allure-results --disable-warnings
        continue-on-error: true

      - name: Fix swagger-parser dependency
        if: ${{ always() }}
        run: |
            SWAGGER_LIB="/opt/hostedtoolcache/Python/3.12.12/x64/lib/python3.12/site-packages/swagger_coverage_py/swagger-coverage-commandline/lib"
            # Удаляем конфликтующие старые версии
            rm -f $SWAGGER_LIB/swagger-parser-*.jar
            rm -f $SWAGGER_LIB/swagger-parser-core-*.jar
            rm -f $SWAGGER_LIB/swagger-parser-v3-*.jar
            # Скачиваем совместимые версии
            wget -q https://repo1.maven.org/maven2/io/swagger/parser/v3/swagger-parser/2.1.12/swagger-parser-2.1.12.jar -P $SWAGGER_LIB
            wget -q https://repo1.maven.org/maven2/io/swagger/parser/v3/swagger-parser-core/2.1.12/swagger-parser-core-2.1.12.jar -P $SWAGGER_LIB
            wget -q https://repo1.maven.org/maven2/io/swagger/parser/v3/swagger-parser-v3/2.1.12/swagger-parser-v3-2.1.12.jar -P $SWAGGER_LIB
            echo "=== Итоговые jar в lib ==="
            ls $SWAGGER_LIB/swagger-parser*.jar

      - name: Debug swagger-coverage java command
        if: ${{ always() }}
        run: |
          SWAGGER_LIB="/opt/hostedtoolcache/Python/3.12.12/x64/lib/python3.12/site-packages/swagger_coverage_py/swagger-coverage-commandline/lib"
          echo "=== Содержимое swagger-coverage-output ==="
          ls swagger-coverage-output/
          COVERAGE_DIR=$(ls swagger-coverage-output/ | tail -1)
          echo "Используем папку: $COVERAGE_DIR"
          java -cp "$SWAGGER_LIB/*" \
          com.github.viclovsky.swagger.coverage.CommandLine \
          -s swagger-doc-dm-api-account.json \
          -i swagger-coverage-output/$COVERAGE_DIR \
          -c swagger-coverage-config-dm-api-account.json

      - name: Run Coverage
        if: ${{ always() }}
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "=== корень проекта ==="
          ls *.html 2>/dev/null || echo "html файлов нет в корне"
          echo "=== swagger-coverage-output ==="
          ls swagger-coverage-output/ 2>/dev/null || echo "папки нет"
          # Запускаем бота только если html файл существует
          if [ -f "swagger-coverage-dm-api-account.html" ]; then
            python -m packages.notifier.bot
          else
            echo "HTML файл не найден, swagger-coverage не отработал корректно"
            exit 1
          fi  

      - name: Archive allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 1

  generate-report:
    runs-on: ubuntu-latest
    needs: test
    name: Generate report
    steps:
      - uses: actions/setup-java@v3
        with:
          distribution: 'microsoft'
          java-version: '17'
      - run: sudo wget https://github.com/allure-framework/allure2/releases/download/2.37.0/allure-2.37.0.tgz && sudo tar -xvzf allure-2.37.0.tgz -C /opt/ && sudo ln -s /opt/allure-2.37.0/bin/allure /usr/bin/allure
      - name: Download allure results
        uses: actions/download-artifact@v4
      - run: allure generate -c allure-results -o _site
      - name: Store report
        uses: actions/upload-artifact@v4
        with:
          name: _site
          path: _site
          retention-days: 1

  publish-report:
    runs-on: ubuntu-latest
    needs: generate-report
    name: Publish report
    steps:
      - uses: actions/checkout@v4
      - name: Download site report
        uses: actions/download-artifact@v4
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - run: echo "https://juliatruf.github.io/dm_api_tests/"